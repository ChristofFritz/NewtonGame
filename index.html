<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Newton Game</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  Fire: Space &nbsp;|&nbsp; Click target: auto-aim &nbsp;|&nbsp; R: new map &nbsp;|&nbsp; G: ghost
</div>
<div id="solver"></div>
<div id="panel">
  <div class="row" id="angleRow">
    <label>Angle</label>
    <input id="angle" type="text" value="45.0000000">
    <span style="width:14px;text-align:center">°</span>
    <label id="ghostLabel"><input type="checkbox" id="showGhost" checked> ghost</label>
    <label id="solverModeLabel">solver
      <select id="solverMode">
        <option value="scenic">scenic</option>
        <option value="longest">longest path</option>
        <option value="shortest">shortest path</option>
        <option value="quickest">quickest</option>
        <option value="slingshots">most slingshots</option>
        <option value="random">random</option>
      </select>
    </label>
  </div>
  <div class="row" id="speedRow">
    <label>Speed</label>
    <input id="speed" type="text" value="300.0000000">
    <button id="fire">FIRE</button>
    <input type="color" id="trailColor" title="Trail colour">
    <button id="settingsToggle" title="Settings">⚙</button>
  </div>
  <div id="settings" hidden></div>
</div>

<!-- classic scripts (not ES modules) so the game works from file:// -->
<!-- order matters: shared top-level consts/lets flow top to bottom -->
<script src="js/config.js"></script>
<script src="js/canvas.js"></script>
<script src="js/state.js"></script>
<script src="js/physics.js"></script>
<script src="js/world.js"></script>
<script src="js/firing.js"></script>
<script src="js/ghost.js"></script>
<script src="js/solver.js"></script>
<script src="js/panel.js"></script>
<script src="js/settings.js"></script>
<script src="js/render.js"></script>
<script src="js/main.js"></script>
</body>
</html>
